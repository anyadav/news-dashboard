<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global News Dashboard</title>
<style>
:root {
--bg: #f4f5f7;
--card-bg: #ffffff;
--accent: #2563eb;
--text: #1f2937;
--muted: #6b7280;
--border: #e5e7eb;
}
* { box-sizing: border-box; }
body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background: var(--bg);
color: var(--text);
}
header {
background: var(--card-bg);
border-bottom: 1px solid var(--border);
padding: 1rem 1.5rem;
position: sticky;
top: 0;
z-index: 10;
}
header h1 {
margin: 0 0 0.25rem 0;
font-size: 1.4rem;
}
#last-updated {
font-size: 0.85rem;
color: var(--muted);
}
.tabs {
display: flex;
flex-wrap: wrap;
gap: 0.5rem;
padding: 0.75rem 1.5rem;
background: var(--card-bg);
border-bottom: 1px solid var(--border);
position: sticky;
top: 64px;
z-index: 9;
}
.tab-btn {
border: 1px solid var(--border);
background: var(--bg);
border-radius: 999px;
padding: 0.4rem 0.9rem;
cursor: pointer;
font-size: 0.95rem;
display: flex;
align-items: center;
gap: 0.4rem;
transition: background 0.15s, color 0.15s;
}
.tab-btn.active {
background: var(--accent);
color: #fff;
border-color: var(--accent);
}
main {
padding: 1rem 1.5rem 2rem;
max-width: 1100px;
margin: 0 auto;
}
.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 1rem;
}
.card {
background: var(--card-bg);
border: 1px solid var(--border);
border-radius: 10px;
padding: 1rem;
display: flex;
flex-direction: column;
gap: 0.5rem;
}
.card .source {
font-size: 0.8rem;
font-weight: 600;
color: var(--accent);
text-transform: uppercase;
letter-spacing: 0.03em;
}
.card h3 {
margin: 0;
font-size: 1.05rem;
line-height: 1.35;
}
.card p {
margin: 0;
font-size: 0.9rem;
color: var(--muted);
flex-grow: 1;
}
.card .meta {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 0.8rem;
color: var(--muted);
}
.card a.read-more {
color: var(--accent);
text-decoration: none;
font-weight: 600;
font-size: 0.85rem;
}
.card a.read-more:hover { text-decoration: underline; }
.empty-state {
text-align: center;
color: var(--muted);
padding: 3rem 1rem;
}
@media (max-width: 480px) {
.tabs { top: 58px; }
header h1 { font-size: 1.15rem; }
}
.wc-tracker {
margin-bottom: 1.5rem;
}
.wc-tracker h3 {
margin: 0;
font-size: 1.1rem;
}
.wc-note {
font-size: 0.78rem;
color: var(--muted);
font-style: italic;
margin: 0;
}
.wc-block {
border-top: 1px solid var(--border);
padding-top: 0.75rem;
margin-top: 0.75rem;
}
.wc-block:first-of-type {
border-top: none;
padding-top: 0;
margin-top: 0;
}
.wc-block h4 {
margin: 0 0 0.4rem 0;
font-size: 0.98rem;
}
.wc-block p {
margin: 0 0 0.35rem 0;
font-size: 0.85rem;
color: var(--text);
}
.wc-table {
width: 100%;
border-collapse: collapse;
font-size: 0.83rem;
margin-top: 0.35rem;
}
.wc-table th, .wc-table td {
text-align: left;
padding: 0.35rem 0.5rem;
border-bottom: 1px solid var(--border);
}
.wc-table th {
color: var(--muted);
font-weight: 600;
font-size: 0.72rem;
text-transform: uppercase;
}
  .sports-panel-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    align-items: start;
    margin-bottom: 1.5rem;
  }
  .sports-panel-split .wc-tracker {
    margin-bottom: 0;
  }
  @media (max-width: 700px) {
    .sports-panel-split { grid-template-columns: 1fr; }
  }
  .okinawa-feature {
    background: var(--card-bg);
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 1rem;
  }
  .okinawa-feature .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 0.5rem;
  }
  .okinawa-feature h3 {
    margin: 0 0 0.4rem 0;
    font-size: 1.1rem;
  }
  .okinawa-feature .ok-meta {
    margin: 0 0 0.5rem 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .okinawa-feature .ok-details {
    margin: 0 0 0.5rem 0;
    font-size: 0.85rem;
  }
  .okinawa-feature .ok-details a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .okinawa-feature .ok-details a:hover {
    text-decoration: underline;
  }
  .okinawa-feature .ok-news-item {
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
    margin-top: 0.5rem;
  }
  .okinawa-feature .ok-news-item:first-of-type {
    border-top: none;
    padding-top: 0;
    margin-top: 0;
  }
  .okinawa-feature .ok-news-source {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
  }
  .okinawa-feature .ok-news-item a {
    color: var(--text);
    text-decoration: none;
    font-size: 0.85rem;
  }
  .okinawa-feature .ok-news-item a:hover {
    color: var(--accent);
    text-decoration: underline;
  }
        .okinawa-feature .ok-india-highlight {
                  margin: 0.6rem 0;
                  padding: 0.5rem 0.6rem;
                  border: 1px solid var(--accent);
                  border-radius: 6px;
                  background: rgba(255, 153, 51, 0.08);
        }
        .okinawa-feature .ok-india-badge {
                  font-size: 0.72rem;
                  font-weight: 700;
                  text-transform: uppercase;
                  color: var(--accent);
                  margin-bottom: 0.25rem;
        }
        .okinawa-feature .ok-india-highlight p {
                  margin: 0;
                  font-size: 0.85rem;
        }
        .okinawa-feature .ok-india-tag {
                  display: inline-block;
                  font-size: 0.65rem;
                  font-weight: 700;
                  color: #fff;
                  background: var(--accent);
                  border-radius: 3px;
                  padding: 0 4px;
                  margin-right: 4px;
        }
</style>
</head>
<body>

<header>
<h1>Global News Dashboard</h1>
<div id="last-updated">Loading...</div>
</header>

<nav class="tabs" id="tabs"></nav>

<main>
<div id="sports-extra"></div>
<div class="grid" id="news-grid">
<div class="empty-state">Loading news...</div>
</div>
</main>

<script>
const CATEGORIES = [
{ key: "India", label: "India", flag: "🇮🇳" },
{ key: "Nepal", label: "Nepal", flag: "🇳🇵" },
{ key: "Sri Lanka", label: "Sri Lanka", flag: "🇱🇰" },
{ key: "Bhutan", label: "Bhutan", flag: "🇧🇹" },
{ key: "Bangladesh", label: "Bangladesh", flag: "🇧🇩" },
{ key: "Myanmar", label: "Myanmar", flag: "🇲🇲" },
{ key: "Pakistan", label: "Pakistan", flag: "🇵🇰" },
{ key: "Afghanistan", label: "Afghanistan", flag: "🇦🇫" },
{ key: "Taiwan", label: "Taiwan", flag: "🇹🇼" },
{ key: "China", label: "China", flag: "🇨🇳" },
{ key: "Japan", label: "Japan", flag: "🇯🇵" },
{ key: "USA", label: "USA", flag: "🇺🇸" },
{ key: "International", label: "International", flag: "🌍" },
{ key: "Sports", label: "Sports", flag: "🏆" },
{ key: "World Politics", label: "World Politics", flag: "🏛️" },
  { key: "AI-Buzz", label: "AI Buzz", flag: "🤖" },
  { key: "World Conflicts", label: "World Conflicts", flag: "⚔️" },
];

const REFRESH_MS = 15 * 60 * 1000;
let activeCategory = CATEGORIES[0].key;
let newsData = null;

const tabsEl = document.getElementById("tabs");
const gridEl = document.getElementById("news-grid");
const lastUpdatedEl = document.getElementById("last-updated");
const sportsExtraEl = document.getElementById("sports-extra");

const SPORTS_TRACKER_HTML = `
<div class="card wc-tracker">
<div class="source">World Cup &amp; Tournament Tracker</div>
<h3>Live, recent &amp; upcoming world cups</h3>
<p class="wc-note">Data accurate as of July 16, 2026. Schedules, scores and standings change quickly, so please check official sources for live updates.</p>

<div class="wc-block">
<h4>Football: FIFA World Cup 2026 (LIVE)</h4>
<p>Hosts: USA, Canada &amp; Mexico | June 11 - July 19, 2026</p>
<p>Semifinal results: France 0-2 Spain, England 1-2 Argentina</p>
<table class="wc-table">
<tr><th>Fixture</th><th>Date</th><th>Venue</th></tr>
<tr><td>Third-place match: France vs England</td><td>Jul 18</td><td>Miami Gardens</td></tr>
<tr><td>Final: Spain vs Argentina</td><td>Jul 19</td><td>East Rutherford, NJ</td></tr>
</table>
</div>

<div class="wc-block" data-completed="2026-07-05">
<h4>Cricket: ICC Women's T20 World Cup 2026 (Completed)</h4>
<p>Host: England | June 12 - July 5, 2026</p>
<p>Champions: Australia (7th title), defeated England by 7 wickets in the final at Lord's</p>
<table class="wc-table">
<tr><th>Group A (final)</th><th>Pts</th><th>Group B (final)</th><th>Pts</th></tr>
<tr><td>1. Australia</td><td>10</td><td>1. England (H)</td><td>10</td></tr>
<tr><td>2. South Africa</td><td>8</td><td>2. West Indies</td><td>6</td></tr>
<tr><td>3. India</td><td>6</td><td>3. Sri Lanka</td><td>6</td></tr>
<tr><td>4. Bangladesh</td><td>4</td><td>4. New Zealand</td><td>4</td></tr>
<tr><td>5. Pakistan</td><td>2</td><td>5. Scotland</td><td>2</td></tr>
<tr><td>6. Netherlands</td><td>0</td><td>6. Ireland</td><td>2</td></tr>
</table>
</div>

<div class="wc-block">
<h4>Upcoming World Tournaments</h4>
<table class="wc-table">
<tr><th>Event</th><th>Dates</th><th>Host</th></tr>
<tr><td>Commonwealth Games 2026</td><td>Jul 23 - Aug 2</td><td>Glasgow, Scotland</td></tr>
<tr><td>FIH Hockey World Cup (Men's &amp; Women's) 2026</td><td>Aug 14 - 30</td><td>TBA venues</td></tr>
<tr><td>FIBA Women's Basketball World Cup 2026</td><td>Sep 4 - 13</td><td>Germany</td></tr>
<tr><td>Rugby League World Cup (Men's, Women's, Wheelchair) 2026</td><td>Oct 15 - Nov 15</td><td>Australia / NZ / Papua New Guinea</td></tr>
</table>
</div>
</div>
`;

  function isOkinawaFeatureActive() {
      const featureEndsAt = new Date("2026-08-11T00:00:00+09:00").getTime();
      return Date.now() < featureEndsAt;
  }

        const OKINAWA_NEWS_ITEMS = [
          { source: "Muscat Daily", date: "Jul 12, 2026", title: "6 students to represent Oman at Okinawa karate tournament", url: "https://www.muscatdaily.com/2026/07/12/6-students-to-represent-oman-at-okinawa-karate-tournament/", isIndia: false },
          { source: "Oman Observer", date: "Jul 2026", title: "6 karate students to represent Oman at Okinawa World Festival", url: "https://www.omanobserver.om/article/1192797/oman/6-karate-students-to-represent-oman-at-okinawa-world-festival", isIndia: false },
          { source: "The State Port Pilot", date: "Jun 2026", title: "Hewett to compete in world karate championships", url: "https://stateportpilot.com/sports/article_75fe5a1b-7be0-45ce-a93a-ab3a1fadcf35.html", isIndia: false }
                ];

        function renderOkinawaNewsItems() {
                  const sorted = OKINAWA_NEWS_ITEMS.slice().sort(function (a, b) { return (b.isIndia === true ? 1 : 0) - (a.isIndia === true ? 1 : 0); });
                  return sorted.map(function (item) {
                              const tag = item.isIndia ? '<span class="ok-india-tag">India</span>' : '';
                              return '<div class="ok-news-item"><div class="ok-news-source">' + tag + item.source + ' &middot; ' + item.date + '</div><div><a href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + item.title + '</a></div></div>';
                  }).join('');
        }

  const OKINAWA_FEATURE_HTML = `
  <div class="okinawa-feature">
  <div class="badge">Featured &middot; through Aug 10, 2026</div>
  <h3>Spotlight: The 3rd Okinawa Karate World Tournament (Junior) &mdash; Under 15</h3>
  <p class="ok-meta">Main round: July 30 &ndash; August 2, 2026 &nbsp;|&nbsp; Okinawa Convention Center, Okinawa, Japan</p>
  <p class="ok-details">Karateka aged 6 to 14 from more than 80 countries and regions are set to compete in Shuri-te/Tomari-te, Naha-te, Uechi-ryu and Kobudo (Bo) divisions, hosted by the Okinawa Prefectural Government to honor karate's Okinawan origins.</p>
  <p class="ok-details"><a href="https://okinawa-karate.okinawa/en" target="_blank" rel="noopener noreferrer">Official tournament site &rarr;</a></p>
      <div class="ok-india-highlight"><div class="ok-india-badge">Team India Watch &middot; Under-18</div><p>No independently verified news reports of an Indian team or athlete competing in the Under-18 category of this tournament were found as of July 20, 2026. Any confirmed India-related coverage will automatically be shown first in the list below.</p></div>
  ${renderOkinawaNewsItems()}
  <p class="wc-note">Compiled from the official tournament website and recent press coverage as of July 20, 2026. This spotlight automatically reverts to the standard sports feed after August 10, 2026.</p>
  </div>
  `;
  
function updateSportsExtra() {
if (activeCategory === "Sports") {
if (isOkinawaFeatureActive()) {
        sportsExtraEl.innerHTML = '<div class="sports-panel-split">' + OKINAWA_FEATURE_HTML + '<div>' + SPORTS_TRACKER_HTML + '</div></div>';
} else {
        sportsExtraEl.innerHTML = SPORTS_TRACKER_HTML;
}
      filterCompletedEvents();
} else {
sportsExtraEl.innerHTML = "";
}
}

function filterCompletedEvents() {
const HIDE_AFTER_DAYS = 5;
const now = Date.now();
sportsExtraEl.querySelectorAll(".wc-block[data-completed]").forEach(function(block) {
const completedTime = new Date(block.getAttribute("data-completed") + "T00:00:00Z").getTime();
const cutoff = completedTime + HIDE_AFTER_DAYS * 24 * 60 * 60 * 1000;
if (now > cutoff) {
block.remove();
}
});
}

function buildTabs() {
tabsEl.innerHTML = "";
CATEGORIES.forEach(cat => {
const btn = document.createElement("button");
btn.className = "tab-btn" + (cat.key === activeCategory ? " active" : "");
btn.textContent = cat.flag + " " + cat.label;
btn.addEventListener("click", () => {
activeCategory = cat.key;
buildTabs();
renderCategory();
updateSportsExtra();
});
tabsEl.appendChild(btn);
});
}

function timeAgo(isoString) {
const then = new Date(isoString).getTime();
const diffMin = Math.round((Date.now() - then) / 60000);
if (diffMin < 1) return "just now";
if (diffMin < 60) return diffMin + "m ago";
const diffHr = Math.round(diffMin / 60);
if (diffHr < 24) return diffHr + "h ago";
return Math.round(diffHr / 24) + "d ago";
}

function escapeHtml(str) {
const div = document.createElement("div");
div.textContent = str || "";
return div.innerHTML;
}

function renderCategory() {
gridEl.innerHTML = "";
const items = (newsData && newsData.categories && newsData.categories[activeCategory]) || [];

if (items.length === 0) {
gridEl.innerHTML = '<div class="empty-state">No news available for this category yet.</div>';
return;
}

items.forEach(item => {
const card = document.createElement("div");
card.className = "card";
card.innerHTML =
'<div class="source">' + escapeHtml(item.source) + '</div>' +
'<h3>' + escapeHtml(item.title) + '</h3>' +
'<p>' + escapeHtml(item.summary) + '</p>' +
'<div class="meta">' +
'<span>' + timeAgo(item.timestamp) + '</span>' +
'<a class="read-more" href="' + item.link + '" target="_blank" rel="noopener noreferrer">Read full article</a>' +
'</div>';
gridEl.appendChild(card);
});
}

async function loadNews() {
try {
const res = await fetch("news.json?ts=" + Date.now());
if (!res.ok) throw new Error("HTTP " + res.status);
newsData = await res.json();
const generated = new Date(newsData.generated_at);
lastUpdatedEl.textContent = "Last updated: " + generated.toLocaleString();
renderCategory();
} catch (err) {
lastUpdatedEl.textContent = "Unable to load news.json";
console.error(err);
}
}

buildTabs();
updateSportsExtra();
loadNews();
setInterval(loadNews, REFRESH_MS);
</script>

</body>
</html>
